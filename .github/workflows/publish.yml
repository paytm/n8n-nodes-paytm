name: Publish n8n Node
on:
  push:
    branches:
      - main # Triggers on every merge or push to main

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    environment: production # Triggers your 1-min wait and Required Reviewer
    permissions:
      contents: read
      id-token: write # Mandatory for Provenance
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: npm ci

      - name: Quality Checks (Lint & Build)
        run: |
          npm run lint
          npm run build

      - name: n8n Package Scan
        run: npx @n8n/scan-community-package@latest .

      - name: Publish to npm with Provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
